{% extends 'sangam/base.html' %}
{% load static %}

{% block content %}
<div class="min-h-screen bg-gray-100 flex items-center justify-center px-4 py-8">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8">

        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="w-20 h-20 mx-auto bg-orange-100 rounded-full flex items-center justify-center mb-4">
                <img src="{% static 'images/sangam.png' %}" alt="Sangam Logo" class="w-20 h-20">
            </div>

            <h1 class="text-3xl font-extrabold text-gray-900">
                Create
                <span class="text-orange-500">Account</span>
            </h1>
        </div>

        <!-- Error Messages -->
        {% if messages %}
            {% for message in messages %}
                <div class="mb-4 bg-red-100 text-red-600 px-4 py-3 rounded-xl text-sm">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <!-- Register Form -->
        <form method="POST" action="{% url 'register' %}" class="space-y-5">
            {% csrf_token %}

            <!-- Full Name -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                    Full Name
                </label>

                <input 
                    type="text"
                    name="name"
                    required
                    placeholder="Enter full name"
                    class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500"
                >
            </div>

            <!-- Username -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                    Username
                </label>

                <input 
                    type="text"
                    name="username"
                    required
                    placeholder="Choose username"
                    class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500"
                >
            </div>

            <!-- Phone -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                    Phone Number
                </label>

                <div class="flex">
                    <span class="px-4 flex items-center bg-gray-100 border border-r-0 border-gray-300 rounded-l-xl text-gray-600 text-sm">
                        +91
                    </span>

                    <input 
                        type="tel"
                        name="phone"
                        required
                        placeholder="Enter phone number"
                        class="w-full border border-gray-300 rounded-r-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500"
                    >
                </div>
            </div>

            <!-- Password -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                    Password
                </label>

                <input 
                    type="password"
                    name="password"
                    required
                    placeholder="Create password"
                    class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500"
                >
            </div>

            <!-- Confirm Password -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                    Confirm Password
                </label>

                <input 
                    type="password"
                    name="confirm_password"
                    required
                    placeholder="Confirm password"
                    class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500"
                >
            </div>

            <!-- Terms -->
            <div class="flex items-start gap-2 text-sm text-gray-600">
                <input type="checkbox" required class="mt-1 rounded border-gray-300 text-orange-500 focus:ring-orange-500">

                <p>
                    I agree to the 
                    <a href="#" class="text-orange-500 font-medium hover:underline">
                        Terms & Conditions
                    </a>
                </p>
            </div>

            <!-- Button -->
            <button 
                type="submit"
                class="w-full bg-orange-500 hover:bg-orange-600 transition text-white py-3 rounded-xl font-bold shadow-md"
            >
                Create Account
            </button>
        </form>

        <!-- Footer -->
        <div class="mt-8 text-center text-sm text-gray-500">
            Already have an account?
            <a href="{% url 'login' %}" class="text-orange-500 font-semibold hover:underline">
                Login
            </a>
        </div>

    </div>

</div>
{% endblock %}
