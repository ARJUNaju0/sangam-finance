{% extends 'sangam/base.html' %}

{% load static %}

{% block content %}
<div class="min-h-screen bg-gray-100 flex items-center justify-center px-4 py-8">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8">

        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="w-20 h-20 mx-auto bg-orange-100 rounded-full flex items-center justify-center mb-4">
                <img src="{% static 'images/sangam.png' %}" alt="Sangam Logo" class="w-20 h-20">
            </div>

            <h1 class="text-3xl font-extrabold text-gray-900">
                Log
                <span class="text-orange-500">in</span>
            </h1>
        </div>


        <!-- Login Form -->
        <form method="POST" class="space-y-5">
            {% csrf_token %}

            <!-- Username / Phone -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                    Username or Phone
                </label>

                <input 
                    type="text"
                    name="identifier"
                    required
                    placeholder="Enter username or phone"
                    class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500"
                >
            </div>

            <!-- Password -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                    Password
                </label>

                <input 
                    type="password"
                    name="password"
                    required
                    placeholder="Enter password"
                    class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500"
                >
            </div>

            <!-- Remember -->
            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center gap-2 text-gray-600">
                    <input type="checkbox" class="rounded border-gray-300 text-orange-500 focus:ring-orange-500">
                    Remember me
                </label>

                <a href="#" class="text-orange-500 hover:text-orange-600 font-medium">
                    Forgot Password?
                </a>
            </div>

            <!-- Button -->
            <button 
                type="submit"
                class="w-full bg-orange-500 hover:bg-orange-600 transition text-white py-3 rounded-xl font-bold shadow-md"
            >
                Login
            </button>
        </form>

        <!-- Footer -->
        <div class="mt-8 text-center text-sm text-gray-500">
            New admin?
            <a href="{% url 'register' %}" class="text-orange-500 font-semibold hover:underline">
                Create account
            </a>
        </div>

    </div>

</div>
{% endblock %}
