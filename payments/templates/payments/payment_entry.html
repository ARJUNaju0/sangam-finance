{% extends 'sangam/base.html' %}

{% block content %}

<h2 class="text-2xl font-bold mb-6 text-orange-600">Add Payment</h2>

<form method="post" class="bg-white p-6 rounded shadow max-w-lg">
    {% csrf_token %}

    <!-- Member -->
    <label class="block text-sm mb-1">Member</label>
    <select name="user_id" class="w-full border p-2 mb-4 rounded">
        {% for user in users %}
        <option value="{{ user.id }}">{{ user.name }} ({{ user.phone }})</option>
        {% endfor %}
    </select>

    <!-- Amount -->
    <label class="block text-sm mb-1">Weekly Amount</label>
    <input name="amount" type="number" step="0.01"
        class="w-full border p-2 mb-4 rounded">

    <!-- Fine -->
    <label class="block text-sm mb-1">Fine Amount</label>
    <input name="fine" type="number" step="0.01"
        class="w-full border p-2 mb-4 rounded" value="0">

    <!-- Note -->
    <label class="block text-sm mb-1">Note (Optional)</label>
    <input name="note"
        class="w-full border p-2 mb-4 rounded">

    <button class="bg-orange-500 text-white px-4 py-2 rounded w-full">
        Save Payment
    </button>

</form>

{% endblock %}
